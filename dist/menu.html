  <style>
    body { background: var(--color-cream); font-family: var(--font-sans); margin: 0; }
    
    /* Navbar styling repeated for consistency */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;

      padding: 0 60px;
      height: 80px;
      display: flex;

    .nav-logo-icon { width: 44px; height: 44px; background: var(--color-navy-mid); border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 9px; border: 1.5px solid rgba(245,197,24,0.3); }

    .nav-links { display: flex; gap: 36px; align-items: center; }
    .nav-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.3s; }
    .nav-link:hover, .nav-link.active { color: #FFF; font-weight: 600; }

    .menu-page-hero {
      background: var(--color-navy-dark);
      padding: 140px 60px 60px;
      color: #FFF;
      border-bottom: 3px solid var(--color-gold);
    }
    .menu-page-hero h1 { font-family: var(--font-display); font-size: clamp(40px, 6vw, 70px); font-weight: 700; margin-bottom: 16px; }
    .menu-page-hero p { font-size: 18px; opacity: 0.7; max-width: 600px; }

    @media (max-width: 1024px) {
      .navbar { padding: 0 24px; }
      .nav-links { display: none; }
      .menu-page-hero { padding: 120px 24px 40px; }
